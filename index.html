<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            margin: 0;
            min-height: 100vh;
            background-color: #000000;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #ededed;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Custom Scrollbar for a sleek look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555555;
        }

        /* Card Hover Effects */
        .project-card {
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        
        .project-card:hover {
            border-color: #888;
        }

        /* Image Grayscale Effect */
        .project-image {
            filter: grayscale(100%) contrast(1.1) brightness(0.8);
            transition: all 0.4s ease;
        }

        .project-card:hover .project-image {
            filter: grayscale(0%) contrast(1) brightness(1);
            transform: scale(1.05);
        }

        /* Staggered Entry Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="selection:bg-white selection:text-black pb-12">

    <!-- Navigation Bar -->
    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-neutral-800 px-6 py-4 flex justify-between items-center transition-all duration-200">
        <div class="flex items-center gap-3 cursor-pointer group">
            <!-- Minimalist Triangle Logo -->
            <svg viewBox="0 0 76 65" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white transition-transform group-hover:scale-110">
                <path d="M37.5274 0L75.0548 65H0L37.5274 0Z" fill="currentColor"/>
            </svg>
            <span class="font-semibold text-sm tracking-wide text-white">Showcase</span>
        </div>
        <div class="flex gap-5">
            <a href="#" class="text-neutral-400 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
            </a>
            <a href="#" class="text-neutral-400 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-6 pt-32 max-w-6xl relative z-10">
        
        <!-- Header Section -->
        <header class="mb-16 max-w-2xl">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight text-white">
                Projects
            </h1>
            <p class="text-neutral-400 text-lg font-normal leading-relaxed">
                A minimal collection of my recent web applications, experiments, and open-source contributions. Built with focus.
            </p>
        </header>

        <!-- Filters (Round Buttons) -->
        <div class="flex flex-wrap gap-3 mb-10" id="filter-container">
            <!-- Active state: bg-white text-black -->
            <!-- Inactive state: text-neutral-400 hover:text-white hover:bg-neutral-900 -->
            <button class="filter-btn px-5 py-2 rounded-full text-sm font-medium transition-all bg-white text-black border border-white" data-filter="all">All</button>
            <button class="filter-btn px-5 py-2 rounded-full text-sm font-medium transition-all text-neutral-400 hover:text-white hover:bg-neutral-900 border border-transparent" data-filter="frontend">Frontend</button>
            <button class="filter-btn px-5 py-2 rounded-full text-sm font-medium transition-all text-neutral-400 hover:text-white hover:bg-neutral-900 border border-transparent" data-filter="fullstack">Fullstack</button>
            <button class="filter-btn px-5 py-2 rounded-full text-sm font-medium transition-all text-neutral-400 hover:text-white hover:bg-neutral-900 border border-transparent" data-filter="ai">AI / Data</button>
        </div>

        <!-- Projects Grid -->
        <main id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards injected by JS -->
        </main>

        <!-- Footer -->
        <footer class="mt-24 border-t border-neutral-800 pt-8 flex flex-col md:flex-row justify-between items-center text-neutral-500 text-sm gap-4">
            <div class="flex items-center gap-2">
                <svg viewBox="0 0 76 65" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-neutral-500">
                    <path d="M37.5274 0L75.0548 65H0L37.5274 0Z" fill="currentColor"/>
                </svg>
                <span>© <span id="year"></span> Workspace Inc.</span>
            </div>
            <div class="flex gap-4">
                <a href="#" class="hover:text-white transition-colors">Command Line</a>
                <a href="#" class="hover:text-white transition-colors">Source Code</a>
            </div>
        </footer>

    </div>

    <script>
        // Set current year in footer
        document.getElementById('year').textContent = new Date().getFullYear();

        // JSON Data with categories
        const projectsData = [
            {
                "id": "proj-1",
                "title": "Neon E-Commerce",
                "description": "A fully functional digital storefront with a glowing dark mode aesthetic, shopping cart, and mock checkout system.",
                "url": "https://example.com/ecommerce",
                "image": "https://images.unsplash.com/photo-1557821552-17105176677c?auto=format&fit=crop&w=800&q=80",
                "tags": ["React", "Tailwind", "Node.js"],
                "category": "fullstack"
            },
            {
                "id": "proj-2",
                "title": "Weatherio Dashboard",
                "description": "Real-time weather tracking application utilizing public APIs to display 7-day forecasts and interactive maps.",
                "url": "https://example.com/weather",
                "image": "https://images.unsplash.com/photo-1592210454359-9043f067919b?auto=format&fit=crop&w=800&q=80",
                "tags": ["HTML", "CSS", "Vanilla JS"],
                "category": "frontend"
            },
            {
                "id": "proj-3",
                "title": "TaskMaster Pro",
                "description": "A kanban-style project management tool with drag-and-drop functionality and local storage persistence.",
                "url": "https://example.com/tasks",
                "image": "https://images.unsplash.com/photo-1611224923853-80b023f02d71?auto=format&fit=crop&w=800&q=80",
                "tags": ["Vue.js", "Firebase", "CSS Grid"],
                "category": "fullstack"
            },
            {
                "id": "proj-4",
                "title": "Crypto Tracker",
                "description": "Live cryptocurrency portfolio dashboard showing real-time market charts, top gainers, and personalized alerts.",
                "url": "https://example.com/crypto",
                "image": "https://images.unsplash.com/photo-1621416894569-0f39ed31d247?auto=format&fit=crop&w=800&q=80",
                "tags": ["Next.js", "Chart.js"],
                "category": "frontend"
            },
            {
                "id": "proj-5",
                "title": "AI Image Generator",
                "description": "A web interface connecting to OpenAI's DALL-E API, allowing users to generate and download custom artwork.",
                "url": "https://example.com/ai-image",
                "image": "https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=800&q=80",
                "tags": ["Python", "Flask", "OpenAI API"],
                "category": "ai"
            },
            {
                "id": "proj-6",
                "title": "Minimalist Blog",
                "description": "A clean, typography-focused markdown blog engine optimized for extreme performance and readability.",
                "url": "https://example.com/blog",
                "image": "https://images.unsplash.com/photo-1499750310107-5fef28a66643?auto=format&fit=crop&w=800&q=80",
                "tags": ["Astro", "Markdown", "Tailwind"],
                "category": "frontend"
            }
        ];

        // Function to render projects based on filter
        function renderProjects(filter = 'all') {
            const grid = document.getElementById('project-grid');
            grid.innerHTML = ''; // Clear current grid
            
            // Filter data
            const filteredData = filter === 'all' 
                ? projectsData 
                : projectsData.filter(p => p.category === filter);

            // Generate HTML
            filteredData.forEach((project, index) => {
                const card = document.createElement('a');
                card.href = project.url;
                card.target = "_blank";
                card.rel = "noopener noreferrer";
                // Sleek border, subtle dark background
                card.className = "project-card block group rounded-2xl border border-neutral-800 bg-neutral-900/30 overflow-hidden cursor-pointer animate-fade-in flex flex-col";
                card.style.animationDelay = `${index * 0.05}s`;
                
                const tagsHTML = project.tags.map(tag => 
                    `<span class="text-[11px] font-medium px-2.5 py-1 rounded-full border border-neutral-800 text-neutral-400 bg-neutral-950">${tag}</span>`
                ).join('');

                card.innerHTML = `
                    <div class="relative h-48 overflow-hidden bg-neutral-900 border-b border-neutral-800">
                        <img 
                            src="${project.image}" 
                            alt="${project.title}" 
                            class="project-image w-full h-full object-cover"
                            loading="lazy"
                        />
                        <!-- Subtle hover overlay -->
                        <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        
                        <!-- Top right external link icon -->
                        <div class="absolute top-3 right-3 bg-black/60 backdrop-blur-sm p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300 border border-neutral-700">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="7" y1="17" x2="17" y2="7"></line>
                                <polyline points="7 7 17 7 17 17"></polyline>
                            </svg>
                        </div>
                    </div>
                    
                    <div class="p-5 flex flex-col flex-1">
                        <h3 class="text-lg font-semibold mb-2 text-white transition-colors tracking-tight flex items-center justify-between">
                            ${project.title}
                        </h3>
                        <p class="text-neutral-400 text-sm mb-6 flex-1 leading-relaxed">
                            ${project.description}
                        </p>
                        <div class="flex flex-wrap gap-2 mt-auto">
                            ${tagsHTML}
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // Filter Logic with styling updates
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Reset all buttons to inactive styling
                filterBtns.forEach(b => {
                    b.className = "filter-btn px-5 py-2 rounded-full text-sm font-medium transition-all text-neutral-400 hover:text-white hover:bg-neutral-900 border border-transparent";
                });
                
                // Set clicked button to active styling
                e.target.className = "filter-btn px-5 py-2 rounded-full text-sm font-medium transition-all bg-white text-black border border-white";
                
                // Re-render
                const filter = e.target.getAttribute('data-filter');
                renderProjects(filter);
            });
        });

        // Initialize rendering on load
        document.addEventListener('DOMContentLoaded', () => renderProjects('all'));
    </script>
</body>
</html>
